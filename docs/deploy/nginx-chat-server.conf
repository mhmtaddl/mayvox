# ─────────────────────────────────────────────────────────────────
# MAYVOX chat-server — nginx reverse proxy + /internal/* savunma
# ─────────────────────────────────────────────────────────────────
#
# Deploy konumu: /etc/nginx/sites-available/chat-server
# Aktifleştir:  ln -s /etc/nginx/sites-available/chat-server /etc/nginx/sites-enabled/
# Test:         nginx -t
# Reload:       systemctl reload nginx
#
# chat-server.cjs 127.0.0.1:10001 üzerinde çalışır.
# Public trafik yalnızca /ws/chat path'inden WS olarak geçirilir.
# /internal/* path'i dış dünyaya KAPATILIR (403). Kod seviyesinde de
# loopback guard aktiftir — bu nginx rule defense-in-depth ikinci kilit.

server {
    listen 443 ssl http2;
    server_name api.cylksohbet.org;

    # SSL sertifikaları (certbot tarafından yönetiliyor)
    ssl_certificate     /etc/letsencrypt/live/api.cylksohbet.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cylksohbet.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    # ── Savunma: internal endpoint'ler asla public olmasın ──
    # Bu blok /ws/chat bloğundan ÖNCE gelmeli (nginx longest-match).
    location ^~ /internal/ {
        deny all;
        return 403;
    }

    # ── Chat WebSocket ──
    location /ws/chat {
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WS uzun süreli bağlantı — timeout yüksek
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health check (opsiyonel public) ──
    location = /chat/health {
        proxy_pass http://127.0.0.1:10001/health;
        proxy_http_version 1.1;
    }

    # Diğer her şey 404
    location / {
        return 404;
    }
}

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    server_name api.cylksohbet.org;
    return 301 https://$host$request_uri;
}
