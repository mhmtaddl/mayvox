<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYVOX</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-app-region: drag;
    user-select: none;
    animation: fadeIn 150ms ease-out both;
  }

  .mark {
    position: relative;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: breathe 1400ms ease-in-out infinite;
  }

  .mark::before {
    content: '';
    position: absolute;
    inset: -14px;
    border-radius: 28%;
    background: radial-gradient(circle, rgba(180,190,210,0.06) 0%, transparent 70%);
    animation: glowPulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }

  .frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 260ms ease-in-out;
    will-change: opacity;
  }
  .frame.active { opacity: 1; }
  .frame:first-child:not(.active) { opacity: 1; }

  /* ── Update bar — logo altında, küçük, sakin ──
   * Width 100px (logo 120px'ten 20px dar), height 5px, margin 8px.
   * Premium / Apple-vari — zıplama yok, bar .mark dışında (breathe scale'inden bağımsız).
   * Renk mode'a göre CSS değişkenleri ile geçer; transition yumuşak. */
  .update-bar {
    margin-top: 8px;
    width: 96px;
    max-width: 96px;
    height: 5px;
    background: rgba(255, 255, 255, 0.07);
    border-radius: 3px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 260ms ease-out;
    pointer-events: none;
    --bar-c1: rgba(180, 195, 220, 0.55);
    --bar-c2: rgba(230, 236, 245, 0.92);
  }
  body.updating .update-bar {
    opacity: 1;
  }

  .update-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--bar-c1), var(--bar-c2));
    border-radius: 3px;
    /* width: progress güncellemesi; background: mode rengi geçişi — ikisi de ease-out */
    transition: width 220ms ease-out, background 180ms ease-out;
    will-change: width;
  }

  /* Mode renkleri — soft, doygunluğu düşük, premium */
  body.mode-checking    .update-bar { --bar-c1: rgba(140, 200, 230, 0.55); --bar-c2: rgba(180, 225, 242, 0.92); }
  body.mode-downloading .update-bar { --bar-c1: rgba(150, 165, 225, 0.55); --bar-c2: rgba(195, 175, 240, 0.92); }
  body.mode-installing  .update-bar { --bar-c1: rgba(225, 185, 130, 0.60); --bar-c2: rgba(245, 215, 160, 0.95); }
  body.mode-error       .update-bar { --bar-c1: rgba(225, 155, 130, 0.55); --bar-c2: rgba(240, 180, 155, 0.90); }

  /* Indeterminate — checking veya error kısa anlarında */
  body.updating.indeterminate .update-bar-fill {
    width: 40%;
    animation: slide 1500ms ease-in-out infinite;
  }

  /* Installing — bar dolu, üstünden shimmer geçer (dondu hissi vermesin).
   * Süre %20 yavaşlatıldı (1600 → 1920ms) — daha sakin, premium his. */
  body.mode-installing .update-bar-fill {
    width: 100%;
    background: linear-gradient(
      90deg,
      var(--bar-c1) 0%,
      var(--bar-c2) 50%,
      var(--bar-c1) 100%
    );
    background-size: 220% 100%;
    animation: installShimmer 1920ms linear infinite;
    /* Width transition'ı kapatma; background 180ms ease-out mode geçişinde çalışsın */
    transition: background 180ms ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.07); }
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.4; transform: scale(0.96); }
    50%      { opacity: 1;   transform: scale(1.04); }
  }

  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(250%); }
  }

  @keyframes installShimmer {
    0%   { background-position: 100% 0; }
    100% { background-position: -120% 0; }
  }
</style>
</head>
<body>
  <div class="mark" id="mark">
    <img class="frame active" src="splash-frame-0.png" alt="" draggable="false">
    <img class="frame"        src="splash-frame-1.png" alt="" draggable="false">
    <img class="frame"        src="splash-frame-2.png" alt="" draggable="false">
    <img class="frame"        src="splash-frame-3.png" alt="" draggable="false">
    <img class="frame"        src="splash-frame-4.png" alt="" draggable="false">
  </div>
  <div class="update-bar" id="updateBar"><div class="update-bar-fill" id="updateBarFill"></div></div>
  <script>
    (function () {
      var frames = document.querySelectorAll('.frame');
      if (!frames || frames.length < 2) return;
      var idx = 0;
      var CYCLE_MS = 1400;
      var swap = function () {
        var prev = idx;
        idx = (idx + 1) % frames.length;
        frames[prev].classList.remove('active');
        frames[idx].classList.add('active');
      };
      var kickoff = setTimeout(function () {
        swap();
        interval = setInterval(swap, CYCLE_MS);
      }, CYCLE_MS / 2);
      var interval = null;
      var cleanup = function () { clearTimeout(kickoff); if (interval) clearInterval(interval); };
      window.addEventListener('pagehide', cleanup);
      window.addEventListener('beforeunload', cleanup);
    })();

    (function () {
      var api = window.splashUpdate;
      if (!api) return;
      var body = document.body;
      var fill = document.getElementById('updateBarFill');
      var MODES = ['mode-checking', 'mode-downloading', 'mode-installing', 'mode-error'];

      function setMode(next) {
        MODES.forEach(function (m) { body.classList.remove(m); });
        body.classList.remove('updating', 'indeterminate');
        if (!next) return;
        body.classList.add('updating');
        if (next === 'checking' || next === 'error') {
          body.classList.add('indeterminate', 'mode-' + next);
        } else if (next === 'installing') {
          body.classList.add('mode-installing'); // shimmer CSS'te kendi animasyonu
        } else if (next === 'downloading') {
          body.classList.add('mode-downloading');
          if (fill) fill.style.width = '0%';
        }
      }

      api.onMode(setMode);

      api.onProgress(function (percent) {
        if (!fill) return;
        // Progress sadece downloading modunda width değiştirir;
        // installing modunda shimmer çalışır ve width: 100% CSS'te sabit
        if (!body.classList.contains('mode-downloading')) return;
        var p = Math.max(0, Math.min(100, Math.round(percent || 0)));
        body.classList.remove('indeterminate');
        fill.style.width = p + '%';
      });
    })();
  </script>
</body>
</html>
