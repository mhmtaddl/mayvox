<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYVOX</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-app-region: drag;
    user-select: none;
    animation: fadeIn 150ms ease-out both;
  }

  .mark {
    position: relative;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Çok hafif glow — PNG arkasında derinlik */
  .mark::before {
    content: '';
    position: absolute;
    inset: -14px;
    border-radius: 28%;
    background: radial-gradient(circle, rgba(180,190,210,0.06) 0%, transparent 70%);
    animation: glowPulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }

  .logo {
    width: 120px;
    height: 120px;
    object-fit: contain;
    position: relative;
    z-index: 1;
    animation: breathe 2.5s ease-in-out infinite;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.03); }
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.4; transform: scale(0.96); }
    50%      { opacity: 1;   transform: scale(1.04); }
  }
</style>
</head>
<body>
  <div class="mark">
    <img class="logo" src="splash-logo.png" alt="MAYVOX" draggable="false">
  </div>
</body>
</html>
