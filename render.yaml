services:
  - type: web
    name: caylaklar-token-server
    env: node
    buildCommand: npm install --omit=dev
    startCommand: node server.cjs
    envVars:
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      # SUPABASE_URL ve SUPABASE_ANON_KEY tercih edilir.
      # Eski deploy'larda VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY da çalışır (fallback var).
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
